<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Detective Sheep 🐑</title>
<style>
*{box-sizing:border-box}body{margin:0;overflow:hidden;font-family:system-ui;background:linear-gradient(#aee8ff,#fff6d8);height:100vh}
.sky{position:absolute;inset:0}
.cloud{position:absolute;background:#fff;border-radius:50px;width:120px;height:40px;animation:drift 24s linear infinite}
.cloud:before,.cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}
.cloud:before{width:50px;height:50px;left:15px;top:-20px}.cloud:after{width:60px;height:60px;right:15px;top:-28px}
.c1{top:12%;left:-150px}.c2{top:28%;left:-260px;animation-duration:32s}
@keyframes drift{to{transform:translateX(calc(100vw + 400px));}}
.ground{position:absolute;bottom:0;width:100%;height:28%;background:#7bd66f;border-top-left-radius:50% 20%;border-top-right-radius:50% 20%}
#sheep{position:absolute;left:50%;bottom:18%;transform:translateX(-50%) scale(.2);transition:transform 8s ease}
#sheep svg{width:170px}
#dialog{position:absolute;top:8%;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.88);padding:18px 22px;border-radius:20px;max-width:90%;text-align:center;font-size:1.2rem;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.hidden{opacity:0;transition:opacity .6s}
.show{opacity:1}
#btn{display:none;margin-top:12px;padding:10px 18px;border:none;border-radius:999px;background:#ff6ea9;color:#fff;font-size:1rem;cursor:pointer}
.heart{position:absolute;font-size:24px;animation:float 5s linear forwards}
@keyframes float{from{transform:translateY(0);opacity:1}to{transform:translateY(-220px);opacity:0}}
</style>
</head>
<body>
<div class="sky">
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div id="dialog"></div>
<div id="sheep">
<svg viewBox="0 0 220 180">
<ellipse cx="110" cy="85" rx="60" ry="45" fill="#fff"/>
<circle cx="60" cy="80" r="28" fill="#444"/>
<circle cx="52" cy="74" r="4" fill="#fff"/>
<circle cx="68" cy="74" r="4" fill="#fff"/>
<path d="M58 87 Q60 93 66 87" stroke="#fff" stroke-width="2" fill="none"/>
<rect x="86" y="18" width="42" height="16" fill="#3a3a3a"/>
<rect x="96" y="0" width="22" height="24" fill="#555"/>
<line x1="70" y1="56" x2="95" y2="36" stroke="#555" stroke-width="4"/>
<circle cx="100" cy="33" r="12" fill="none" stroke="#888" stroke-width="4"/>
<line x1="85" y1="120" x2="85" y2="150" stroke="#444" stroke-width="5"/>
<line x1="105" y1="120" x2="105" y2="150" stroke="#444" stroke-width="5"/>
<line x1="125" y1="120" x2="125" y2="150" stroke="#444" stroke-width="5"/>
<line x1="145" y1="120" x2="145" y2="150" stroke="#444" stroke-width="5"/>
</svg>
</div>
<div class="ground"></div>
</div>
<script>
const d=document.getElementById('dialog');
const sheep=document.getElementById('sheep');
const lines=[
"📨 Detective Sheep has received an urgent report...",
"Someone very, very precious is feeling a little sad.",
"🐑 *waddles closer...*",
"🔍 Investigating...",
"Evidence found: Low smile levels 😔",
"Diagnosis: Needs hugs, snacks... and one amazing boyfriend ❤️",
"Hey... can I tell you something?"
];
let i=0;
function type(text,cb){
 d.innerHTML="";
 let j=0;
 const t=setInterval(()=>{
   d.innerHTML=text.slice(0,++j);
   if(j>=text.length){clearInterval(t); if(cb) setTimeout(cb,900);}
 },35);
}
function next(){
 if(i===2){sheep.style.transform="translateX(-50%) scale(1)";}
 if(i<lines.length){type(lines[i++],next);}
 else{
   d.innerHTML=' <b>love you boo.</b><br><br>Even if I cannot be there to hug you today, I hope this tiny detective sheep reminds you that you are loved, appreciated, and never alone.<br><br>You make my world brighter, and I\'m always cheering for you. 💖<br><br><button id="btn" style="display:inline-block">Give Sheep a Hug 🫂</button>';
   document.getElementById("btn").onclick=()=>{
      for(let k=0;k<40;k++){
        const h=document.createElement("div");
        h.className="heart";
        h.textContent="❤️";
        h.style.left=Math.random()*innerWidth+"px";
        h.style.bottom="20px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
      }
   };
 }
}
setTimeout(next,800);
</script>
</body>
</html>
